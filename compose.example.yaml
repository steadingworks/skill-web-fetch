secrets:
  skill_web_public_key:
    file: ./secrets/skill_web_public_key.pem

services:
  api:
    image: ghcr.io/steadingworks/skill-web-fetch:latest
    ports:
      - "8081:8081"
    secrets:
      - skill_web_public_key
    environment:
      - WEBFETCH_JWT_PUBLIC_KEY_PATH=/run/secrets/skill_web_public_key
      - WEBFETCH_JWT_ISSUER=<your-auth-host>
      - WEBFETCH_LOG_LEVEL=INFO
      - WEBFETCH_SEARXNG_BASE_URL=http://searxng:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # SearXNG requires direct internet access — do not run on a VPN-routed host
